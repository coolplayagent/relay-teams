name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  agents-self-check:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Require linked issue for PRs into main
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: python src/relay_teams/release/pull_request_issue_link.py

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dev dependencies
        run: uv sync --extra dev --no-default-groups

      - name: Ruff lint gate
        run: uv run --extra dev ruff check --no-cache --force-exclude .

      - name: Ruff format gate
        run: uv run --extra dev ruff format --check --no-cache --force-exclude .

      - name: basedpyright type gate
        run: uv run --extra dev basedpyright

      - name: Bandit security gate
        run: >
          uv run --extra dev bandit -r src
          --configfile pyproject.toml
          --severity-level high
          --confidence-level medium

      - name: Radon complexity gate
        run: >
          uv run --extra dev xenon
          --max-absolute F
          --max-modules C
          --max-average B
          --exclude src/relay_teams/builtin/skills/pptx-craft/scripts/svg_to_pptx
          src/relay_teams
          src/relay_teams_evals

      - name: Unit tests with coverage
        env:
          RELAY_TEAMS_UNIT_TEST_TIMEOUT_SECONDS: "5"
        run: >
          uv run --extra dev pytest -q tests/unit_tests
          --cov=src/relay_teams
          --cov=src/relay_teams_evals
          --cov-report=xml:coverage.xml

      - name: Build copy-aware coverage diff
        run: |
          mkdir -p .tmp
          git diff -C1% origin/main...HEAD > .tmp/diff-cover-copy-aware.diff

      - name: Enforce changed-line unit coverage
        run: >
          uv run --extra dev diff-cover coverage.xml
          --config-file pyproject.toml
          --diff-file .tmp/diff-cover-copy-aware.diff

      - name: Install Playwright Chromium
        run: uv run --extra dev python -m playwright install --with-deps chromium

      - name: Integration tests
        run: uv run --extra dev pytest -q tests/integration_tests

      - name: Verify repository is unchanged after checks
        run: git diff --exit-code
