name: Qodana Configuration Upload

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload-qodana-config:
    runs-on: ubuntu-latest
    env:
      QODANA_CONFIGURATIONS_TOKEN: ${{ secrets.QODANA_CONFIGURATIONS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip upload when token is unavailable
        if: env.QODANA_CONFIGURATIONS_TOKEN == ''
        run: echo "QODANA_CONFIGURATIONS_TOKEN is not configured; skipping upload."

      - name: Run Qodana Configuration Uploader
        if: env.QODANA_CONFIGURATIONS_TOKEN != ''
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            -e QODANA_CONFIGURATIONS_TOKEN="${QODANA_CONFIGURATIONS_TOKEN}" \
            jetbrains/qodana-configuration-uploader:latest \
            --global-configs-file qodana-global-configurations.yaml \
            --qodana-endpoint https://qodana.cloud
