name: Publish To PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-to-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.deleted == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/cool-play-agent-teams/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install build dependencies
        run: uv sync --extra dev --no-default-groups

      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "Expected tag format v<version>, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Write release version file
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          printf '%s\n' \
            '# -*- coding: utf-8 -*-' \
            'from __future__ import annotations' \
            '' \
            '__all__ = ["__version__"]' \
            '' \
            "__version__ = \"${RELEASE_VERSION}\"" \
            '' > src/agent_teams/_version.py

      - name: Build distribution
        run: uv build

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Report published version
        run: echo "Published version ${{ steps.version.outputs.version }}"
