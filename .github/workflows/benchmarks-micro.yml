name: Micro-Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  micro-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run micro-benchmarks
        run: |
          uv run pytest benchmarks/micro/ \
            --benchmark-only \
            --benchmark-json=tmp/bench-micro-results.json \
            --benchmark-disable-gc

      - name: Compare with previous run
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Micro-benchmark comparison would be done here against cached baseline."
          echo "Performance regression threshold: 10%"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: micro-benchmark-results
          path: tmp/bench-micro-results.json
