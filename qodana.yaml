version: "1.0"
linter: qodana-python-community
withinDocker: false
failThreshold: 0
profile:
  name: qodana.recommended
exclude:
  - name: All
    paths:
      - .agent_teams
      - .codex
      - .pytest_cache
      - .ruff_cache
      - .tmp
      - .venv
      - docs
      - frontend/dist
      - openspec
      - src/relay_teams/builtin/skills/pptx-craft/scripts/svg_to_pptx
  # Qodana's Python runner currently reports these JetBrains-only checks
  # broadly across main; ruff and basedpyright remain the type/style gates.
  - name: PyTypeHintsInspection
  - name: PyMethodMayBeStaticInspection
  - name: PyInconsistentReturnsInspection
  - name: PyShadowingNamesInspection
  - name: PyProtectedMemberInspection
  - name: PyRedundantParenthesesInspection
  - name: PyUnusedLocalInspection
  - name: PyClassHasNoInitInspection
  - name: PyListCreationInspection
  - name: PyPep8NamingInspection
  - name: PyChainedComparisonsInspection
  - name: PyAbstractClassInspection
  - name: PyAsyncCallInspection
  - name: PyBroadExceptionInspection
  - name: PyDeprecationInspection
  - name: PyInvalidCastInspection
  - name: PyNoneFunctionAssignmentInspection
  - name: PyProtocolInspection
  - name: PyShadowingBuiltinsInspection
  - name: PySimplifyBooleanCheckInspection
  - name: PyUnnecessaryCastInspection
  - name: PyUnreachableCodeInspection
  - name: PyUnresolvedReferencesInspection
  - name: RegExpRedundantEscape
  - name: RegExpSimplifiable
  - name: RegExpSingleCharAlternation
  # Keep the provider SSO scoped excludes visible for release guard coverage.
  - name: PyTypeHintsInspection
    paths: &provider_sso_qodana_paths
      - src/relay_teams/interfaces/server/routers/system.py
      - src/relay_teams/providers/codeagent_auth.py
      - src/relay_teams/providers/model_config.py
      - src/relay_teams/providers/model_config_manager.py
      - src/relay_teams/providers/model_connectivity.py
  - name: PyMethodMayBeStaticInspection
    paths:
      - src/relay_teams/providers/codeagent_auth.py
      - src/relay_teams/providers/model_connectivity.py
  - name: PyInconsistentReturnsInspection
    paths:
      - src/relay_teams/providers/codeagent_auth.py
  - name: PyPropertyDefinitionInspection
    paths:
      - src/relay_teams/agents/execution/agent_llm_session.py
      - src/relay_teams/agents/execution/event_publishing.py
      - src/relay_teams/agents/execution/failure_reporting.py
      - src/relay_teams/agents/execution/message_commit.py
      - src/relay_teams/agents/execution/prompt_budgeting.py
      - src/relay_teams/agents/execution/prompt_history.py
      - src/relay_teams/agents/execution/recovery_flow.py
      - src/relay_teams/agents/execution/session_mixin_base.py
      - src/relay_teams/agents/execution/session_prompt.py
      - src/relay_teams/agents/execution/session_recovery.py
      - src/relay_teams/agents/execution/session_runtime.py
      - src/relay_teams/agents/execution/session_support.py
      - src/relay_teams/agents/execution/stream_events.py
      - src/relay_teams/agents/execution/tool_args_recovery.py
      - src/relay_teams/agents/execution/tool_result_state.py
