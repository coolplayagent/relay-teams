version: "1.0"
linter: qodana-python-community
withinDocker: false
failThreshold: 0
profile:
  name: qodana.recommended
exclude:
  - name: All
    paths:
      - .agent_teams
      - .codex
      - .pytest_cache
      - .ruff_cache
